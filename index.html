<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jhosep | Home</title>
    <style>
      :root {
        --bg-1: #f6efe6;
        --bg-2: #d9e8f5;
        --ink: #1b1a19;
        --accent: #cc5a2f;
        --card: rgba(255, 255, 255, 0.65);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 20% 20%, rgba(204, 90, 47, 0.22), transparent 40%),
          radial-gradient(circle at 80% 80%, rgba(29, 74, 120, 0.2), transparent 40%),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .home {
        width: min(900px, 100%);
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.75);
        border-radius: 24px;
        padding: 48px 28px;
        backdrop-filter: blur(10px);
        box-shadow: 0 18px 40px rgba(16, 26, 37, 0.16);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 10vw, 5.2rem);
        letter-spacing: 0.06em;
        text-transform: lowercase;
      }

      p {
        margin: 14px 0 0;
        font-size: clamp(1rem, 3.2vw, 1.2rem);
        opacity: 0.78;
      }

      .tag {
        margin-top: 24px;
        display: inline-flex;
        border-radius: 999px;
        background: #ffffff;
        border: 1px solid rgba(27, 26, 25, 0.1);
        padding: 10px 16px;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="home">
      <h1>jhosep</h1>
      <p>Home de mis proyectos mas importantes.</p>
      <span class="tag">Pronto: portafolio de proyectos</span>
    </main>
  </body>
</html>
